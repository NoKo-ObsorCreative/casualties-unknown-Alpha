name: Build Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unzip the project
        run: unzip -o casualties-unknown.zip -d extracted

      - name: Build the mod
        working-directory: extracted/casualties-unknown
        run: gradle build --no-daemon

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: casualties-unknown-jar
          path: extracted/casualties-unknown/build/libs/*.jar
